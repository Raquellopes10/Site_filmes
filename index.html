  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const carrossels = document.querySelectorAll('.mySwiper');
    carrossels.forEach((element) => {
      new Swiper(element, {
        slidesPerView: 'auto',
        spaceBetween: 10,
        navigation: {
          nextEl: element.querySelector('.swiper-button-next'),
          prevEl: element.querySelector('.swiper-button-prev'),
        },
        freeMode: true,
        grabCursor: true,
      });
    });
  </script>
